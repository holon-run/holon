evaluation:
  summary: |
    Add historical task discovery to MemorySearch by indexing compact, reduced
    task receipt documents. Use the latest reduced task record per task id
    rather than raw tasks.jsonl ledger events, make terminal tasks discoverable
    after TaskList becomes active-only, and allow MemoryGet to fetch the chosen
    task source ref. Command task documents should include searchable command
    identity such as task id, command fragment, digest, preview, summary, and
    final status without indexing large command output.
