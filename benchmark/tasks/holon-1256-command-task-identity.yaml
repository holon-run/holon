  summary: |
    TaskList and TaskStatus expose command identity for command_task records so
    agents can compare active background commands without relying on summaries
    or cmd_preview. The projection should include full cmd, digest, resolved
    workdir, shell, login, tty, and promoted_from_exec_command where available,
    while preserving compact behavior for non-command tasks.
