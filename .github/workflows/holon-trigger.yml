name: Holon Trigger

on:
  issue_comment:
    types: [created]
  issues:
    types: [labeled, assigned]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: read
  id-token: write

concurrency:
  group: holon-${{ github.workflow }}-${{ github.event_name }}-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  holon:
    name: Run Holon
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Holon
        uses: ./
        with:
          build_from_source: 'true'
          trigger: auto
          auto_review: ${{ vars.HOLON_AUTO_REVIEW || 'false' }}
          auto_review_on_push: ${{ vars.HOLON_AUTO_REVIEW_ON_PUSH || 'false' }}
          model: bigmodel/glm-5.2
          github_token: ${{ secrets.HOLON_GITHUB_TOKEN }}
          bigmodel_api_key: ${{ secrets.bigmodel_api_key || secrets.BIGMODEL_API_KEY }}
        env:
          BIGMODEL_API_KEY: ${{ secrets.bigmodel_api_key || secrets.BIGMODEL_API_KEY }}
