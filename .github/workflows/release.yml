
name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: holon-linux-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: holon-darwin-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: holon-darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build web GUI
        run: make web

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Package release archive
        run: |
          set -euo pipefail
          mkdir -p dist
          tmpdir="$(mktemp -d)"
          cp "target/${{ matrix.target }}/release/holon" "$tmpdir/holon"
          tar -czf "dist/${{ matrix.asset }}.tar.gz" -C "$tmpdir" holon
          shasum -a 256 "dist/${{ matrix.asset }}.tar.gz" > "dist/${{ matrix.asset }}.tar.gz.sha256"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.asset }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          pattern: release-*
          merge-multiple: true

      - name: Validate release version
        run: |
          set -euo pipefail
          crate_version="$(awk -F '"' '/^version = / { print $2; exit }' Cargo.toml)"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$crate_version" != "$tag_version" ]; then
            echo "Cargo.toml version ($crate_version) must match tag version ($tag_version)." >&2
            exit 1
          fi

      - name: Prepare checksums and Homebrew formula
        run: |
          set -euo pipefail
          (
            cd dist-artifacts
            rm -f ./*.sha256
            shasum -a 256 ./*.tar.gz | sort -k2 > checksums.txt
          )
          bash scripts/generate-homebrew-formula.sh \
            "$GITHUB_REF_NAME" \
            dist-artifacts/checksums.txt \
            homebrew-tap/Formula/holon.rb

      - name: Upload Homebrew formula artifact
        uses: actions/upload-artifact@v4
        with:
          name: homebrew-formula
          path: homebrew-tap/Formula/holon.rb
          if-no-files-found: error

      - name: Prepare release notes
        run: |
          set -euo pipefail
          cat > release-notes.md <<EOF
          ## Runtime line

          Holon ${GITHUB_REF_NAME} is part of the Rust runtime line. The Rust runtime is now the main \`holon\` binary.

          This release adds a Bing Web Search provider with managed WebSearch tool kept alongside native search, an external trigger token-only storage model with reset-callback API, and trigger revocation on agent stop. It also fixes max_turns counting, coerce_string JSON-string parsing for tool arguments, callback_base_url/advertise_url decoupling, and skill install for non-flat catalog layouts. The memory indexer is redesigned as a single daemon with outbox cleanup, and SQLite connection init gains PRAGMA tuning for better performance.

          Supported binary assets for this release are Linux amd64, macOS amd64, and macOS arm64.

          ## Changes

          - Add Bing Web Search provider and keep managed WebSearch alongside native search ([#2075](https://github.com/holon-run/holon/pull/2075)).
          - Store external trigger token only, add reset-callback API ([#2072](https://github.com/holon-run/holon/pull/2072)).
          - Revoke external triggers when agent is stopped ([#2074](https://github.com/holon-run/holon/pull/2074)).
          - Parse JSON-string arrays/objects in coerce_string for tool arguments ([#2073](https://github.com/holon-run/holon/pull/2073)).
          - Fix max_turns counter to use turn_index instead of total_model_rounds ([#2070](https://github.com/holon-run/holon/pull/2070)).
          - Emit first-run intro when provider is configured ([#2069](https://github.com/holon-run/holon/pull/2069)).
          - Decouple callback_base_url from advertise_url ([#2068](https://github.com/holon-run/holon/pull/2068)).
          - Support non-flat catalog layouts and non-main default branches in skill install ([#2067](https://github.com/holon-run/holon/pull/2067)).
          - Redesign memory indexer to single daemon with outbox cleanup ([#2061](https://github.com/holon-run/holon/pull/2061)).
          - Add SQLite PRAGMA tuning to connection init for performance ([#2063](https://github.com/holon-run/holon/pull/2063)).

          ## Install

          Homebrew:

          \`\`\`bash
          brew tap holon-run/tap
          brew install holon
          \`\`\`

          Direct binary:

          \`\`\`bash
          curl -L "https://github.com/holon-run/holon/releases/download/${GITHUB_REF_NAME}/holon-linux-amd64.tar.gz" | tar -xz
          chmod +x holon
          ./holon --help
          \`\`\`

          Replace \`holon-linux-amd64.tar.gz\` with \`holon-darwin-amd64.tar.gz\` or \`holon-darwin-arm64.tar.gz\` on macOS.
          EOF

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            dist-artifacts/*.tar.gz
            dist-artifacts/checksums.txt

      - name: Push Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "HOMEBREW_TAP_TOKEN is not configured; formula was generated as an artifact only."
            exit 0
          fi

          tap_dir="$(mktemp -d)"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/holon-run/homebrew-tap.git" "$tap_dir"
          mkdir -p "$tap_dir/Formula"
          cp homebrew-tap/Formula/holon.rb "$tap_dir/Formula/holon.rb"

          cd "$tap_dir"
          git config user.name "holon-bot"
          git config user.email "holon-bot@holon.run"
          git add Formula/holon.rb
          if git diff --staged --quiet; then
            echo "Homebrew formula is already up to date."
            exit 0
          fi
          git commit -m "Update Holon formula for ${GITHUB_REF_NAME}"
          git push origin main
