name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: holon-linux-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: holon-darwin-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: holon-darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Package release archive
        run: |
          set -euo pipefail
          mkdir -p dist
          tmpdir="$(mktemp -d)"
          cp "target/${{ matrix.target }}/release/holon" "$tmpdir/holon"
          tar -czf "dist/${{ matrix.asset }}.tar.gz" -C "$tmpdir" holon
          shasum -a 256 "dist/${{ matrix.asset }}.tar.gz" > "dist/${{ matrix.asset }}.tar.gz.sha256"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.asset }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          pattern: release-*
          merge-multiple: true

      - name: Validate release version
        run: |
          set -euo pipefail
          crate_version="$(awk -F '"' '/^version = / { print $2; exit }' Cargo.toml)"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$crate_version" != "$tag_version" ]; then
            echo "Cargo.toml version ($crate_version) must match tag version ($tag_version)." >&2
            exit 1
          fi

      - name: Prepare checksums and Homebrew formula
        run: |
          set -euo pipefail
          (
            cd dist-artifacts
            rm -f ./*.sha256
            shasum -a 256 ./*.tar.gz | sort -k2 > checksums.txt
          )
          bash scripts/generate-homebrew-formula.sh \
            "$GITHUB_REF_NAME" \
            dist-artifacts/checksums.txt \
            homebrew-tap/Formula/holon.rb

      - name: Upload Homebrew formula artifact
        uses: actions/upload-artifact@v4
        with:
          name: homebrew-formula
          path: homebrew-tap/Formula/holon.rb
          if-no-files-found: error

      - name: Prepare release notes
        run: |
          set -euo pipefail
          cat > release-notes.md <<EOF
          ## Runtime line

          Holon ${GITHUB_REF_NAME} is part of the Rust runtime line. The Rust runtime is now the main \`holon\` binary.

          This line is intentionally breaking relative to the old Go-line releases. If you need the old Go implementation, stay on \`v0.12.0\`.

          This release focuses on the embedded Web GUI, HTTP control-plane usability, runtime storage/index reliability, object-reference based projection hydration, provider/runtime diagnostics, and broader regression coverage.

          Supported binary assets for this release are Linux amd64, macOS amd64, and macOS arm64.

          ## Changes

          - Add and embed the Web GUI, including runtime settings, agent controls, event timeline/config updates, sidebar refinements, and connection UX improvements ([#1803](https://github.com/holon-run/holon/pull/1803), [#1786](https://github.com/holon-run/holon/pull/1786), [#1790](https://github.com/holon-run/holon/pull/1790), [#1868](https://github.com/holon-run/holon/pull/1868), [#1876](https://github.com/holon-run/holon/pull/1876), [#1882](https://github.com/holon-run/holon/pull/1882), [#1886](https://github.com/holon-run/holon/pull/1886)).
          - Improve HTTP control-plane access with configurable CORS, localhost/loopback CORS defaults, cross-agent message search, unified memory-backed search, and agent-id filtering ([#1785](https://github.com/holon-run/holon/pull/1785), [#1885](https://github.com/holon-run/holon/pull/1885), [#1787](https://github.com/holon-run/holon/pull/1787), [#1880](https://github.com/holon-run/holon/pull/1880), [#1881](https://github.com/holon-run/holon/pull/1881)).
          - Add credential store CRUD APIs and Web GUI API-key input for provider setup ([#1854](https://github.com/holon-run/holon/pull/1854)).
          - Project agent_home notes and compact agent memory into prompt context ([#1777](https://github.com/holon-run/holon/pull/1777), [#1853](https://github.com/holon-run/holon/pull/1853)).
          - Add runtime object resolver/query-cache foundations, ref-backed transcript tool results, and transcript-backed brief hydration for slimmer projections ([#1822](https://github.com/holon-run/holon/pull/1822), [#1839](https://github.com/holon-run/holon/pull/1839), [#1828](https://github.com/holon-run/holon/pull/1828), [#1811](https://github.com/holon-run/holon/pull/1811), [#1825](https://github.com/holon-run/holon/pull/1825)).
          - Add event watcher SSE fanout and persist daemon restart launch options ([#1824](https://github.com/holon-run/holon/pull/1824)).
          - Improve runtime database reliability and performance with serialized/retryable writes, tighter lock boundaries, queue/work-item query indexes, cached projections, and payload slimming ([#1788](https://github.com/holon-run/holon/pull/1788), [#1792](https://github.com/holon-run/holon/pull/1792), [#1807](https://github.com/holon-run/holon/pull/1807), [#1856](https://github.com/holon-run/holon/pull/1856), [#1857](https://github.com/holon-run/holon/pull/1857), [#1860](https://github.com/holon-run/holon/pull/1860), [#1845](https://github.com/holon-run/holon/pull/1845), [#1846](https://github.com/holon-run/holon/pull/1846), [#1833](https://github.com/holon-run/holon/pull/1833), [#1794](https://github.com/holon-run/holon/pull/1794), [#1797](https://github.com/holon-run/holon/pull/1797), [#1801](https://github.com/holon-run/holon/pull/1801), [#1804](https://github.com/holon-run/holon/pull/1804), [#1806](https://github.com/holon-run/holon/pull/1806), [#1823](https://github.com/holon-run/holon/pull/1823), [#1832](https://github.com/holon-run/holon/pull/1832)).
          - Harden memory indexing by moving search indexing to the runtime outbox and keeping index failures off critical writes ([#1865](https://github.com/holon-run/holon/pull/1865), [#1870](https://github.com/holon-run/holon/pull/1870), [#1871](https://github.com/holon-run/holon/pull/1871)).
          - Add bounded and granular runtime performance diagnostics across turn lifecycle, provider phases, tool execution, persistence, and projection substeps ([#1768](https://github.com/holon-run/holon/pull/1768), [#1841](https://github.com/holon-run/holon/pull/1841)).
          - Improve provider/model support with GLM-5.2 catalog support, updated vision model selection, gpt-5.5 codex catalog entry, Anthropic streaming support, and richer body-read timeout traces ([#1755](https://github.com/holon-run/holon/pull/1755), [#1738](https://github.com/holon-run/holon/pull/1738), [#1872](https://github.com/holon-run/holon/pull/1872), [#1875](https://github.com/holon-run/holon/pull/1875)).
          - Expose private child agent status and supervised-child token usage through local control/task APIs ([#1748](https://github.com/holon-run/holon/pull/1748), [#1744](https://github.com/holon-run/holon/pull/1744)).
          - Fix wait/focus and queue state behavior, including work item focus during waits, unified wait-state projection, stale agent-scoped wait cancellation, queue-entry current-state storage, and legacy anchor recency handling ([#1734](https://github.com/holon-run/holon/pull/1734), [#1780](https://github.com/holon-run/holon/pull/1780), [#1829](https://github.com/holon-run/holon/pull/1829), [#1852](https://github.com/holon-run/holon/pull/1852), [#1877](https://github.com/holon-run/holon/pull/1877)).
          - Expand regression coverage for message dispatch, wake hints, scheduler/lifecycle behavior, tasks/bootstrap, turn pure functions, storage backfill/error paths, HTTP route snapshots, and agent-scoped work item state ([#1873](https://github.com/holon-run/holon/pull/1873), [#1869](https://github.com/holon-run/holon/pull/1869), [#1867](https://github.com/holon-run/holon/pull/1867), [#1866](https://github.com/holon-run/holon/pull/1866), [#1864](https://github.com/holon-run/holon/pull/1864), [#1847](https://github.com/holon-run/holon/pull/1847), [#1809](https://github.com/holon-run/holon/pull/1809)).
          - Add and refine public docs/RFCs for onboarding, tool guides, provider OAuth, external triggers, agent actor invocation, and runtime object references ([#1782](https://github.com/holon-run/holon/pull/1782)).

          ## Install

          Homebrew:

          \`\`\`bash
          brew tap holon-run/tap
          brew install holon
          \`\`\`

          Direct binary:

          \`\`\`bash
          curl -L "https://github.com/holon-run/holon/releases/download/${GITHUB_REF_NAME}/holon-linux-amd64.tar.gz" | tar -xz
          chmod +x holon
          ./holon --help
          \`\`\`

          Replace \`holon-linux-amd64.tar.gz\` with \`holon-darwin-amd64.tar.gz\` or \`holon-darwin-arm64.tar.gz\` on macOS.
          EOF

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            dist-artifacts/*.tar.gz
            dist-artifacts/checksums.txt

      - name: Push Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "HOMEBREW_TAP_TOKEN is not configured; formula was generated as an artifact only."
            exit 0
          fi

          tap_dir="$(mktemp -d)"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/holon-run/homebrew-tap.git" "$tap_dir"
          mkdir -p "$tap_dir/Formula"
          cp homebrew-tap/Formula/holon.rb "$tap_dir/Formula/holon.rb"

          cd "$tap_dir"
          git config user.name "holon-bot"
          git config user.email "holon-bot@holon.run"
          git add Formula/holon.rb
          if git diff --staged --quiet; then
            echo "Homebrew formula is already up to date."
            exit 0
          fi
          git commit -m "Update Holon formula for ${GITHUB_REF_NAME}"
          git push origin main
