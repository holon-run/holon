name: Holon Solve

on:
  workflow_call:
    inputs:
      ref:
        description: GitHub issue or PR reference, such as owner/repo#123.
        required: false
        type: string
        default: ''
      trigger:
        description: Trigger mode. Use explicit for ref-driven runs or auto to derive ref/goal from the GitHub event.
        required: false
        type: string
        default: auto
      repo:
        description: GitHub repository hint for shorthand refs such as #123.
        required: false
        type: string
        default: ''
      base:
        description: Base branch hint.
        required: false
        type: string
        default: ''
      goal:
        description: Explicit solve goal.
        required: false
        type: string
        default: ''
      model:
        description: Holon model ref.
        required: false
        type: string
        default: ''
      version:
        description: Holon version to download when build_from_source is false.
        required: false
        type: string
        default: latest
      build_from_source:
        description: Build Holon from source.
        required: false
        type: boolean
        default: true
      holon_repository:
        description: Holon repository for source builds.
        required: false
        type: string
        default: holon-run/holon
      holon_ref:
        description: Optional Holon git ref for source builds.
        required: false
        type: string
        default: ''
      holonbot_broker_url:
        description: Holonbot token broker URL. Leave empty to skip OIDC broker exchange.
        required: false
        type: string
        default: https://bot.holon.run/api/exchange-token
      holonbot_oidc_audience:
        description: OIDC audience for Holonbot token broker exchange.
        required: false
        type: string
        default: holon-token-broker
      runs_on:
        description: Runner label.
        required: false
        type: string
        default: ubuntu-latest
    secrets:
      anthropic_auth_token:
        required: false
      anthropic_api_key:
        required: false
      openai_api_key:
        required: false
      holon_github_token:
        required: false
      anthropic_base_url:
        required: false
      openai_base_url:
        required: false
    outputs:
      result:
        description: Holon solve step outcome.
        value: ${{ jobs.solve.outputs.result }}
      summary:
        description: Path to Holon summary markdown when produced.
        value: ${{ jobs.solve.outputs.summary }}

jobs:
  solve:
    runs-on: ${{ inputs.runs_on }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    outputs:
      result: ${{ steps.holon.outputs.result }}
      summary: ${{ steps.holon.outputs.summary }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout Holon action
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.holon_repository }}
          ref: ${{ inputs.holon_ref }}
          path: .holon/action

      - name: Run Holon
        id: holon
        uses: ./.holon/action
        with:
          ref: ${{ inputs.ref }}
          trigger: ${{ inputs.trigger }}
          repo: ${{ inputs.repo }}
          base: ${{ inputs.base }}
          goal: ${{ inputs.goal }}
          model: ${{ inputs.model || vars.HOLON_MODEL || '' }}
          version: ${{ inputs.version }}
          build_from_source: ${{ inputs.build_from_source }}
          holon_repository: ${{ inputs.holon_repository }}
          holon_ref: ${{ inputs.holon_ref }}
          holonbot_broker_url: ${{ inputs.holonbot_broker_url }}
          holonbot_oidc_audience: ${{ inputs.holonbot_oidc_audience }}
          github_token: ${{ secrets.holon_github_token }}
          anthropic_auth_token: ${{ secrets.anthropic_auth_token || secrets.anthropic_api_key }}
          anthropic_base_url: ${{ secrets.anthropic_base_url }}
          openai_api_key: ${{ secrets.openai_api_key }}
          openai_base_url: ${{ secrets.openai_base_url }}
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.anthropic_auth_token || secrets.anthropic_api_key }}
          ANTHROPIC_BASE_URL: ${{ secrets.anthropic_base_url }}
          OPENAI_API_KEY: ${{ secrets.openai_api_key }}
          OPENAI_BASE_URL: ${{ secrets.openai_base_url }}
