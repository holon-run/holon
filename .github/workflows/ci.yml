name: CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - ".dockerignore"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - "src/**"
      - "tests/**"
      - "agent_templates/**"
      - "builtin_templates/**"
      - "docs/website/reference/openapi.json"
      - "docs/website/reference/model-tool-schema-inventory.json"
      - "web-gui/**"
      - "Makefile"
      - "build.rs"
      - "scripts/docker-smoke.sh"
      - "scripts/docker-e2e.py"
      - "scripts/docker-live-acceptance.py"
      - "scripts/docker_e2e/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - ".dockerignore"
      - "Cargo.toml"
      - "Cargo.lock"
      - "Dockerfile"
      - "src/**"
      - "tests/**"
      - "agent_templates/**"
      - "builtin_templates/**"
      - "docs/website/reference/openapi.json"
      - "docs/website/reference/model-tool-schema-inventory.json"
      - "web-gui/**"
      - "Makefile"
      - "build.rs"
      - "scripts/docker-smoke.sh"
      - "scripts/docker-e2e.py"
      - "scripts/docker-live-acceptance.py"
      - "scripts/docker_e2e/**"

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
      rust: ${{ steps.filter.outputs.rust }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docker:
              - '.github/workflows/ci.yml'
              - '.dockerignore'
              - 'Dockerfile'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'Makefile'
              - 'build.rs'
              - 'scripts/docker-smoke.sh'
              - 'scripts/docker-e2e.py'
              - 'scripts/docker-live-acceptance.py'
              - 'scripts/docker_e2e/**'
            rust:
              - '.github/workflows/ci.yml'
              - 'src/**'
              - 'tests/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'build.rs'
              - 'Makefile'
              - 'agent_templates/**'
              - 'builtin_templates/**'
              - 'web-gui/**'
            web:
              - 'web-gui/**'
              - '.github/workflows/ci.yml'

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.docker == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          push: false
          tags: holon:ci
          cache-from: type=gha,scope=holon-docker
          cache-to: type=gha,mode=max,scope=holon-docker

      - name: Smoke test image
        run: scripts/docker-smoke.sh holon:ci

      - name: Validate Docker E2E runner
        run: make docker-e2e-validate

      - name: Publish latest image
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          repository="$(printf '%s' "ghcr.io/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          docker tag holon:ci "${repository}:latest"
          docker push "${repository}:latest"

  rust:
    name: Rust
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            web-gui/app/package-lock.json
            web-gui/openapi-tools/package-lock.json

      - name: Test and build web GUI
        if: needs.changes.outputs.web == 'true'
        run: make web-ci

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: make fmt-check

      - name: Build
        run: make build

      - name: Check generated snapshots
        run: make snapshots-check

      - name: Audit test temp resources
        run: make test-resource-lint

      - name: Test
        run: make test

      - name: Clippy
        run: make lint
        env:
          RUSTFLAGS: ""

  rust-concurrent:
    name: Rust Concurrent
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test concurrent runtime lifecycles
        run: make test-concurrent

      - name: Repeat core lifecycle tests on main
        if: github.event_name == 'push'
        run: make test-concurrent-repeat CONCURRENT_REPEATS=2

  coverage:
    name: Coverage
    needs: changes
    if: github.event_name == 'push' || needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web-gui/app/package-lock.json

      - name: Build web GUI
        if: needs.changes.outputs.web == 'true'
        run: make web

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage
        run: cargo llvm-cov --all-targets --lcov --output-path lcov.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: lcov.info
