name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Build
        run: cargo build --all-targets

      - name: Test
        run: cargo test --all-targets -- --test-threads=1

  benchmark:
    name: Benchmark Harness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: benchmark/package-lock.json

      - name: Install dependencies
        working-directory: benchmark
        run: npm ci

      - name: Test benchmark harness
        working-directory: benchmark
        run: npm test

  agent-bundle:
    name: Agent Bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: agents/claude/package-lock.json

      - name: Install dependencies
        working-directory: agents/claude
        run: npm ci

      - name: Build
        working-directory: agents/claude
        run: npm run build

      - name: Test
        working-directory: agents/claude
        run: npm test
