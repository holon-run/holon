name: Rust CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "tests/**"
      - "builtin_templates/**"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "tests/**"
      - "builtin_templates/**"

permissions:
  contents: read

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Build
        run: cargo build --all-targets

      - name: Test
        run: cargo test --all-targets -- --test-threads=1
