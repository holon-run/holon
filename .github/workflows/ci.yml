name: CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "tests/**"
      - "agent_templates/**"
      - "builtin_templates/**"
      - "docs/website/reference/openapi.json"
      - "web-gui/**"
      - "Makefile"
      - "build.rs"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/ci.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "tests/**"
      - "agent_templates/**"
      - "builtin_templates/**"
      - "docs/website/reference/openapi.json"
      - "web-gui/**"
      - "Makefile"
      - "build.rs"

permissions:
  contents: read

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            web-gui/app/package-lock.json
            web-gui/openapi-tools/package-lock.json

      - name: Test and build web GUI
        run: make web-ci

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: make fmt-check

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Clippy
        run: make lint
        env:
          RUSTFLAGS: ""

  rust-concurrent:
    name: Rust Concurrent
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test concurrent runtime lifecycles
        run: make test-concurrent

      - name: Repeat core lifecycle tests on main
        if: github.event_name == 'push'
        run: make test-concurrent-repeat CONCURRENT_REPEATS=2

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: web-gui/app/package-lock.json

      - name: Build web GUI
        run: make web

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage
        run: cargo llvm-cov --all-targets --lcov --output-path lcov.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: lcov.info
